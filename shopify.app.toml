# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e11e17b6ee2a0f800ad26c79a3e2a92c"
name = "Waskat shop bot app"
application_url = "https://waskatapp-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "read_products,write_products,read_inventory,write_inventory,read_orders,read_analytics,write_discounts,read_discounts"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://waskatapp-production.up.railway.app/api/auth" ]
